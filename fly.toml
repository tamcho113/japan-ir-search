app = "japan-ir-search"
primary_region = "nrt"

[build]

[env]
  JAPAN_IR_SEARCH_DATA = "/data"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "ir_data"
  destination = "/data"
